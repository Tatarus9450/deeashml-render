services:
  - type: web
    name: deeashml-render
    runtime: python
    plan: free
    region: singapore
    buildCommand: "python -m pip install --only-binary=:all: -r requirements.txt"
    startCommand: python serve_final_app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
